<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Chess Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>Chess Game</h1>
            <div class="game-controls">
                <button id="restart-btn" class="btn">Restart Game</button>
                <div class="turn-indicator">
                    <span id="current-player">White</span>'s Turn
                </div>
            </div>
        </div>
        
        <div class="game-content">
            <div class="board-container">
                <div id="chessboard" class="chessboard">
                    <!-- Board squares will be generated by JavaScript -->
                </div>
                <div id="game-status" class="game-status"></div>
            </div>
            
            <div class="sidebar">
                <div class="move-history">
                    <h3>Move History</h3>
                    <div id="move-list" class="move-list">
                        <!-- Move history will be populated by JavaScript -->
                    </div>
                </div>
                
                <div class="captured-pieces">
                    <h4>Captured Pieces</h4>
                    <div class="captured-white">
                        <span>White:</span>
                        <div id="captured-white" class="captured-list"></div>
                    </div>
                    <div class="captured-black">
                        <span>Black:</span>
                        <div id="captured-black" class="captured-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pawn promotion modal -->
    <div id="promotion-modal" class="modal">
        <div class="modal-content">
            <h3>Choose promotion piece:</h3>
            <div class="promotion-options">
                <div class="promotion-piece" data-piece="queen">♛</div>
                <div class="promotion-piece" data-piece="rook">♜</div>
                <div class="promotion-piece" data-piece="bishop">♝</div>
                <div class="promotion-piece" data-piece="knight">♞</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
